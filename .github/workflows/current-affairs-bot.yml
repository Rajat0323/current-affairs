name: Current Affairs Bot

on:
  workflow_dispatch:
  schedule:
    # Keep a 15-minute cadence, but avoid the busiest :00 slot on GitHub Actions.
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: current-affairs-bot
  cancel-in-progress: false

jobs:
  post-current-affairs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: telegram_bot

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID || secrets.CHANNEL_ID }}
      TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID || secrets.GROUP_ID }}
      TELEGRAM_REQUIRE_GROUP: ${{ vars.TELEGRAM_REQUIRE_GROUP || 'true' }}
      TELEGRAM_BRAND_NAME: ${{ vars.TELEGRAM_BRAND_NAME || 'GKShot Daily' }}
      TELEGRAM_CHANNEL_REF: ${{ vars.TELEGRAM_CHANNEL_REF || '@gkshotdaily' }}
      TELEGRAM_GROUP_REF: ${{ vars.TELEGRAM_GROUP_REF || '@gkshotdaily1' }}
      TELEGRAM_CALL_TO_ACTION: ${{ vars.TELEGRAM_CALL_TO_ACTION || 'Join GKShot Daily for UPSC current affairs quiz, SSC GK MCQ, polity, history, geography, economy, and exam-focused revision.' }}
      TELEGRAM_DISCOVERY_KEYWORDS: ${{ vars.TELEGRAM_DISCOVERY_KEYWORDS || 'UPSC current affairs quiz, UPSC GK quiz, daily current affairs MCQ, SSC GK quiz, Indian polity quiz, history GK, geography quiz, UPSC prelims MCQ' }}
      GROUP_ANSWER_DELAY_MINUTES: ${{ vars.GROUP_ANSWER_DELAY_MINUTES || '30' }}
      GROUP_DISCUSSION_CALL_TO_ACTION: ${{ vars.GROUP_DISCUSSION_CALL_TO_ACTION || 'Discuss the national or international exam angle from this current affairs update.' }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || secrets.NEWSAPI_KEY }}
      NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.LLM_API_KEY || secrets.GROQ_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || secrets.LLM_BASE_URL || secrets.GROQ_BASE_URL || vars.OPENAI_BASE_URL || vars.LLM_BASE_URL || vars.GROQ_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || secrets.LLM_MODEL || secrets.GROQ_MODEL || vars.OPENAI_MODEL || vars.LLM_MODEL || vars.GROQ_MODEL || 'gpt-4.1-mini' }}
      CURRENT_AFFAIRS_QUERY: ${{ vars.CURRENT_AFFAIRS_QUERY || 'India government OR parliament OR national politics OR foreign policy OR international relations' }}
      NEWSDATA_INDIA_QUERY: ${{ vars.NEWSDATA_INDIA_QUERY || 'India OR government OR parliament OR politics OR policy' }}
      NEWSDATA_WORLD_QUERY: ${{ vars.NEWSDATA_WORLD_QUERY || 'international relations OR diplomacy OR geopolitics OR foreign policy' }}
      NEWSDATA_INDIA_COUNTRY: ${{ vars.NEWSDATA_INDIA_COUNTRY || 'in' }}
      NEWSDATA_API_URL: ${{ vars.NEWSDATA_API_URL || 'https://newsdata.io/api/1/latest' }}
      PREFERRED_TOPIC_KEYWORDS: ${{ vars.PREFERRED_TOPIC_KEYWORDS || 'india,indian,national,government,union government,central government,parliament,lok sabha,rajya sabha,cabinet,prime minister,president,ministry,supreme court,judgment,constitution,constitutional,governance,scheme,policy,bill,act,election,election commission,committee,commission,regulation,guideline,diplomacy,foreign policy,international relations,geopolitics,bilateral,multilateral,defence,security,summit,treaty,agreement,ceasefire,sanction,un,united nations,who,wto,imf,world bank,adb,brics,g20,quad,saarc,asean' }}
      BLOCKED_TOPIC_KEYWORDS: ${{ vars.BLOCKED_TOPIC_KEYWORDS || 'celebrity,actor,actress,box office,movie,film trailer,relationship,love life,viral,used car,car review,phone review,shopping,deals,quote of the day,travel guide,holiday,entertainment,gossip,web3,event promotion,product launch,market report,cagr,biopic,fitness method,ufo,astrology,horoscope,reels,instagram,x bio,mothers day,wedding look,style tips,skin care,net worth,luxury,launch event,sale today,homebuyer,real estate tips,loan emi,buying guide,property advice,astrological,dating,weekend watch,celeb,fan war,local news,city news,traffic jam,road accident,crime,robbery,murder,shooting,weather update,school holiday,train delay,metro delay,water supply,power cut' }}
      ALLOWED_SOURCE_DOMAINS: ${{ vars.ALLOWED_SOURCE_DOMAINS || 'thehindu.com,indianexpress.com,pib.gov.in,prsindia.org,business-standard.com,livemint.com,thehindubusinessline.com,economictimes.indiatimes.com,timesofindia.indiatimes.com,hindustantimes.com,ndtv.com,news18.com,down2earth.org.in,moneycontrol.com,financialexpress.com,tribuneindia.com,theprint.in,newindianexpress.com,firstpost.com,deccanherald.com' }}
      BLOCKED_SOURCE_DOMAINS: ${{ vars.BLOCKED_SOURCE_DOMAINS || 'globenewswire.com,prnewswire.com,news.google.com,gyanhigyan.com,brandiconimage.com,digitpatrox.com,asianetnews.com,siasat.com,rediff.com,informalnewz.com,goldpricetoday.co.in,collegesearch.in,new7tv.com,cbnc.com,newsable.asianetnews.com' }}
      MINIMUM_ARTICLE_RELEVANCE_SCORE: ${{ vars.MINIMUM_ARTICLE_RELEVANCE_SCORE || '4' }}
      MAX_ARTICLE_AGE_HOURS: ${{ vars.MAX_ARTICLE_AGE_HOURS || '72' }}
      NEWS_PAGE_SIZE: ${{ vars.NEWS_PAGE_SIZE || '10' }}
      MAX_ARTICLES_PER_CYCLE: ${{ vars.MAX_ARTICLES_PER_CYCLE || '2' }}
      REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '30' }}
      TELEGRAM_SEND_MCQ_POLLS: ${{ vars.TELEGRAM_SEND_MCQ_POLLS || 'true' }}
      MCQS_PER_ARTICLE: ${{ vars.MCQS_PER_ARTICLE || '3' }}
      STATE_FILE: data/posted_articles.json
      GROUP_REVEAL_STATE_FILE: data/pending_group_reveals.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        shell: bash
        run: |
          missing=0
          for name in TELEGRAM_BOT_TOKEN TELEGRAM_CHANNEL_ID OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret or variable: $name"
              missing=1
            fi
          done
          if [ -z "${NEWS_API_KEY}" ] && [ -z "${NEWSDATA_API_KEY}" ]; then
            echo "Set at least one news provider key: NEWS_API_KEY or NEWSDATA_API_KEY."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          if [ -n "${GROQ_API_KEY:-}" ] && [ "${OPENAI_BASE_URL}" = "https://api.openai.com/v1" ]; then
            echo "GROQ_API_KEY is set but OPENAI_BASE_URL is still the OpenAI default. Set LLM_BASE_URL or GROQ_BASE_URL to https://api.groq.com/openai/v1."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot cycle
        run: python main.py --once

      - name: Summarize posting result
        shell: bash
        run: |
          if git diff --quiet -- data; then
            {
              echo "## Current Affairs Bot"
              echo
              echo "No new data state changed in this run."
              echo
              echo "That usually means there were no fresh articles and no due answer reveals to send."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Current Affairs Bot"
              echo
              echo "Bot state changed in this run."
              echo
              echo '```'
              git diff --numstat -- data
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit updated posted-article state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update telegram bot state [skip ci]"
          git push
