name: Current Affairs Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: current-affairs-bot
  cancel-in-progress: false

jobs:
  post-current-affairs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: telegram_bot

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID || secrets.CHANNEL_ID }}
      TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID || secrets.GROUP_ID }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY || secrets.NEWSAPI_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.LLM_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || secrets.LLM_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      CURRENT_AFFAIRS_QUERY: ${{ vars.CURRENT_AFFAIRS_QUERY || 'India OR government OR parliament OR economy OR summit OR diplomacy OR science OR sports' }}
      NEWS_PAGE_SIZE: ${{ vars.NEWS_PAGE_SIZE || '10' }}
      MAX_ARTICLES_PER_CYCLE: ${{ vars.MAX_ARTICLES_PER_CYCLE || '2' }}
      REQUEST_TIMEOUT_SECONDS: ${{ vars.REQUEST_TIMEOUT_SECONDS || '30' }}
      TELEGRAM_SEND_MCQ_POLLS: ${{ vars.TELEGRAM_SEND_MCQ_POLLS || 'true' }}
      MCQS_PER_ARTICLE: ${{ vars.MCQS_PER_ARTICLE || '3' }}
      STATE_FILE: data/posted_articles.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required configuration
        shell: bash
        run: |
          missing=0
          for name in NEWS_API_KEY TELEGRAM_BOT_TOKEN TELEGRAM_CHANNEL_ID OPENAI_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret or variable: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot cycle
        run: python main.py --once

      - name: Commit updated posted-article state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_articles.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update telegram bot state [skip ci]"
          git push
